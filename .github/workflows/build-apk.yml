name: Build Solba Panel APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses & install components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Generate Gradle Wrapper JAR
        working-directory: android-app
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          chmod +x /opt/gradle/gradle-8.4/bin/gradle
          mkdir -p gradle/wrapper
          /opt/gradle/gradle-8.4/bin/gradle wrapper \
            --gradle-version=8.4 \
            --distribution-type=bin \
            --project-dir=.
          chmod +x gradlew

      - name: Create local.properties
        working-directory: android-app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          ls -la "$ANDROID_HOME/build-tools/"

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: Copy APK to backend/downloads
        run: |
          mkdir -p backend/downloads
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             backend/downloads/solba-panel.apk
          echo "APK size: $(du -sh backend/downloads/solba-panel.apk)"

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/downloads/solba-panel.apk
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: actualizar solba-panel.apk [skip ci]" && git push)
