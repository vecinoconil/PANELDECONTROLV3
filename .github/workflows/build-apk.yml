name: Build Solba Panel APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build Debug APK
        working-directory: android-app
        run: |
          # Descargar Gradle 8.6 e instalarlo
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH="/opt/gradle/gradle-8.6/bin:$PATH"
          gradle --version

          # local.properties con ruta del SDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          # Compilar APK — capturar output para diagnóstico
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          GRADLE_EXIT=${PIPESTATUS[0]}

          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "##[group]Error de compilación (últimas 100 líneas)"
            tail -100 /tmp/build.log
            echo "##[endgroup]"
            # Emitir como annotations visibles en el check-run
            grep -E "error:|Error|FAILED|Exception" /tmp/build.log | tail -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi

      - name: Copy APK to backend/downloads
        run: |
          mkdir -p backend/downloads
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             backend/downloads/solba-panel.apk
          echo "APK: $(du -sh backend/downloads/solba-panel.apk)"

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/downloads/solba-panel.apk
          git diff --staged --quiet && echo "Sin cambios" || \
            (git commit -m "chore: actualizar solba-panel.apk [skip ci]" && git push)
