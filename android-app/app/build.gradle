plugins {
    id 'com.android.application'
}

android {
    namespace 'com.solba.panel'
    compileSdk 34

    defaultConfig {
        applicationId "com.solba.panel"
        minSdk 21          // Android 5.0 Lollipop en adelante (cubre >99% dispositivos)
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
