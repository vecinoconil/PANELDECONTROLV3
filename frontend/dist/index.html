<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Gestión V3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-6euXxeRS.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CR_Fiym3.css">
  <style>
    /* ── Autoventa mobile fixes ── */
    @media (max-width: 639px) {

      /* 1. Full width */
      [style*="75%"] { max-width: 100% !important; margin: 0 !important; }

      /* 2. Hide the column-header row on mobile */
      [style*="auto 1fr auto auto auto"]:not(.items-center) {
        display: none !important;
      }

      /* 3. Product row: switch from 5-col single-row grid to 3-col 2-row grid
            Col layout: [auto = uds/price]  [1fr = desc/spacer]  [auto = total/delete]
            Row 1: description (col 1-2) | total (col 3)
            Row 2: units (col 1)         | price (col 2)        | delete (col 3)       */
      [style*="auto 1fr auto auto auto"].items-center {
        display: grid !important;
        grid-template-columns: auto 1fr auto !important;
        grid-template-rows: auto auto !important;
        column-gap: 8px !important;
        row-gap: 6px !important;
        padding: 10px 12px !important;
        align-items: center !important;
      }

      /* Child 1 → units input+calc: row 2 col 1 */
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(1) {
        grid-row: 2 !important;
        grid-column: 1 !important;
        width: auto !important;
      }

      /* Child 2 → description: row 1 col 1–2, no truncate */
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(2) {
        grid-row: 1 !important;
        grid-column: 1 / 3 !important;
        padding: 0 !important;
        min-width: 0 !important;
      }
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(2) p:first-child {
        white-space: normal !important;
        overflow: visible !important;
        text-overflow: unset !important;
        font-size: 0.8125rem !important;
        font-weight: 600 !important;
        color: #1e293b !important;
      }

      /* Child 3 → price input+calc: row 2 col 2, align right */
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(3) {
        grid-row: 2 !important;
        grid-column: 2 !important;
        width: auto !important;
        justify-content: flex-end !important;
      }

      /* Child 4 → total: row 1 col 3, hide "—" when empty */
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(4) {
        grid-row: 1 !important;
        grid-column: 3 !important;
        width: auto !important;
        text-align: right !important;
        align-self: center !important;
      }
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(4) .text-slate-300 {
        display: none !important;
      }

      /* Child 5 → delete button: row 2 col 3 */
      [style*="auto 1fr auto auto auto"].items-center > div:nth-child(5) {
        grid-row: 2 !important;
        grid-column: 3 !important;
        width: auto !important;
        justify-content: center !important;
      }

      /* Inputs: bigger touch targets */
      [style*="auto 1fr auto auto auto"].items-center input[type="number"] {
        min-height: 38px !important;
        padding: 6px 8px !important;
        font-size: 0.875rem !important;
      }
      [style*="auto 1fr auto auto auto"].items-center button {
        min-height: 34px !important;
        min-width: 34px !important;
      }
    }
  </style>
</head>

<body>
    <div id="root"></div>

</body>

</html>
